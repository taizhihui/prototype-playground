<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhi's Prototype Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      min-height: 100vh;
      padding: 40px 24px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .header-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }
    
    .header-text h1 {
      font-size: 24px;
      font-weight: 600;
      color: #111;
    }
    
    .header-text p {
      font-size: 14px;
      color: #666;
      margin-top: 2px;
    }
    
    .header-count {
      margin-left: auto;
      font-size: 14px;
      color: #999;
    }
    
    .search {
      margin-bottom: 32px;
    }
    
    .search input {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      background: white;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .search input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }
    
    .search input::placeholder {
      color: #999;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    
    .card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }
    
    .card-image {
      width: 100%;
      height: 200px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    
    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .card-image-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #999;
    }
    
    .card-image-placeholder .phone {
      width: 60px;
      height: 100px;
      background: #222;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .card-image-placeholder .phone::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 4px;
      background: #444;
      border-radius: 2px;
    }
    
    .card-image-placeholder .phone-screen {
      width: 50px;
      height: 80px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #8b5cf6;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    
    .card-body {
      padding: 20px;
    }
    
    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    
    .card-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }
    
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f3f4f6;
    }
    
    .card-author {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .card-author-avatar {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11px;
      font-weight: 600;
    }
    
    .card-author-name {
      font-size: 13px;
      color: #666;
    }
    
    .card-date {
      font-size: 13px;
      color: #999;
    }
    
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    
    .tag {
      font-size: 11px;
      padding: 4px 8px;
      background: #f3f4f6;
      color: #666;
      border-radius: 6px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    
    .empty-state h3 {
      font-size: 18px;
      color: #666;
      margin-bottom: 8px;
    }
    
    @media (max-width: 768px) {
      body { padding: 24px 16px; }
      .header { flex-wrap: wrap; }
      .header-count { width: 100%; margin-left: 64px; margin-top: -8px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <div class="header-icon">🧪</div>
      <div class="header-text">
        <h1>Zhi's Prototype Playground</h1>
        <p>AI Journey Team · Gorgias</p>
      </div>
      <div class="header-count"><span id="count">0</span> prototypes</div>
    </div>
    
    <div class="search">
      <input type="text" id="search" placeholder="Search prototypes...">
    </div>
    
    <div class="grid" id="grid"></div>
    
    <div class="empty-state" id="empty">
      <h3>No prototypes yet</h3>
      <p>Use /publish in Claude Code to add your first prototype</p>
    </div>
    
  </div>
  
  <script>
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    const searchInput = document.getElementById('search');
    
    let prototypes = [];
    
    // Load prototypes from JSON
    fetch('prototypes.json')
      .then(r => r.json())
      .then(data => {
        prototypes = data;
        renderCards(prototypes);
      })
      .catch(() => {
        // No prototypes yet
        renderCards([]);
      });
    
    function renderCards(items) {
      grid.innerHTML = '';
      
      if (items.length === 0) {
        empty.style.display = 'block';
        count.textContent = '0';
        return;
      }
      
      empty.style.display = 'none';
      count.textContent = items.length;
      
      items.forEach(p => {
        const card = document.createElement('a');
        card.href = 'prototypes/' + p.file;
        card.className = 'card';
        card.dataset.tags = (p.tags || []).join(' ').toLowerCase();
        
        const hasImage = p.image && p.image.length > 0;
        
        card.innerHTML = `
          <div class="card-image">
            ${hasImage 
              ? `<img src="images/${p.image}" alt="${p.name}">`
              : `<div class="card-image-placeholder">
                  <div class="phone">
                    <div class="phone-screen">💬</div>
                  </div>
                </div>`
            }
            ${p.badge ? `<div class="card-badge">${p.badge}</div>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${p.name}</div>
            <div class="card-desc">${p.description || ''}</div>
            ${p.tags && p.tags.length > 0 
              ? `<div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` 
              : ''
            }
            <div class="card-meta">
              <div class="card-author">
                <div class="card-author-avatar">${(p.author || 'Z')[0].toUpperCase()}</div>
                <span class="card-author-name">${p.author || 'Zhi'}</span>
              </div>
              <span class="card-date">${p.date || ''}</span>
            </div>
          </div>
        `;
        
        grid.appendChild(card);
      });
    }
    
    // Search
    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const filtered = prototypes.filter(p => {
        const searchText = [
          p.name || '',
          p.description || '',
          (p.tags || []).join(' ')
        ].join(' ').toLowerCase();
        return searchText.includes(query);
      });
      renderCards(filtered);
    });
  </script>
</body>
</html>
