<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Continue Conversation on Chat — Aspire Nutrition Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }

  .phone-frame {
    border-radius: 38px;
    background: #111;
    padding: 10px;
    box-shadow: 0 30px 60px -15px rgba(0,0,0,0.45);
    flex-shrink: 0;
  }
  .phone-screen {
    background: #fff;
    border-radius: 30px;
    overflow: hidden;
    height: 700px;
    width: 360px;
    display: flex;
    flex-direction: column;
  }

  .bubble-in {
    background: #e9e9eb;
    color: #000;
    border-radius: 18px;
    padding: 8px 14px;
    max-width: 78%;
    align-self: flex-start;
  }
  .bubble-out {
    background: #007aff;
    color: #fff;
    border-radius: 18px;
    padding: 8px 14px;
    max-width: 78%;
    align-self: flex-end;
  }

  .browser-frame {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 30px 60px -15px rgba(0,0,0,0.3);
    overflow: hidden;
    height: 720px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .chat-widget {
    position: absolute;
    bottom: 16px;
    left: 16px;
    width: 360px;
    height: 600px;
    background: #c5e2f0;
    border-radius: 18px;
    box-shadow: 0 12px 36px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-bubble-in {
    background: #fff;
    color: #1a2550;
    border-radius: 14px;
    padding: 8px 12px;
    max-width: 82%;
    align-self: flex-start;
  }
  .chat-bubble-out {
    background: #1a2550;
    color: #fff;
    border-radius: 14px;
    padding: 8px 12px;
    max-width: 82%;
    align-self: flex-end;
  }

  .fade-in { animation: fadeIn 0.45s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pulse-ring {
    box-shadow: 0 0 0 0 rgba(125, 195, 224, 0.7);
    animation: pulseRing 1.6s infinite;
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(125, 195, 224, 0.7); }
    70%  { box-shadow: 0 0 0 18px rgba(125, 195, 224, 0); }
    100% { box-shadow: 0 0 0 0 rgba(125, 195, 224, 0); }
  }

  .scrollable::-webkit-scrollbar { width: 4px; }
  .scrollable::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
</style>
</head>
<body class="bg-slate-100">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const ASPIRE = {
  navy: "#1a2550",
  navyDeep: "#0e1838",
  blue: "#7dc3e0",
  blueLight: "#c5e2f0",
  orange: "#f59e0b",
};

const SCENES = [
  {
    id: 1,
    title: "Act 1 · Browse abandonment SMS",
    caption: "AI Journey reaches Sarah after she browsed Bio-Heal yesterday. Two-way SMS, not a one-way blast.",
    pillar: "Relationships replace campaigns",
    activeDevice: "phone",
  },
  {
    id: 2,
    title: "Act 2 · Two-way SMS conversation",
    caption: "Sarah replies. AI Journey answers using Aspire's product catalog and expert content. A starter pack and discount surface, then she taps the link.",
    pillar: "AI agent adapts to intent in real time",
    activeDevice: "phone",
  },
  {
    id: 3,
    title: "Act 3 · Continue conversation on chat",
    caption: "Sarah lands on the Bio-Heal PDP. The on-site chat auto-opens hydrated with the full SMS thread. No restart, no repetition.",
    pillar: "One agent with full journey context · Continuous omnichannel conversations",
    activeDevice: "both",
  },
  {
    id: 4,
    title: "Act 4 · On-site conversion",
    caption: "Chat AI answers the food-timing question, the WELCOME15 code from SMS is honored automatically, and Sarah converts inside the chat.",
    pillar: "End-to-end AI-led conversion",
    activeDevice: "browser",
  },
];

const SMS_MESSAGES = [
  {
    sender: "in",
    text: "Hi Sarah! Saw you were checking out Bio-Heal yesterday. A lot of parents have the same first question — want me to walk through the difference between Bio-Heal and Bio-Heal Pro+?",
    showBy: 1,
  },
  { sender: "out", text: "yes please. is the regular one ok for a 4 year old?", showBy: 1 },
  {
    sender: "in",
    text: "Bio-Heal is great for ages 3+. Starter dose is ½ scoop daily mixed into a cold food or drink. Pro+ is for kids who've been on Bio-Heal 30+ days and need extra immune support. For a 4yo just starting out, regular Bio-Heal is the right call.",
    showBy: 1,
  },
  {
    sender: "in",
    type: "card",
    showBy: 2,
    card: {
      title: "Bio-Heal · Starter Pack",
      sub: "Daily probiotic · 30 servings",
      price: "$54.95",
      strike: "$64.95",
      badge: "15% off first order · WELCOME15",
    },
  },
  { sender: "out", text: "ok one more — does she take it with food or empty stomach?", showBy: 2 },
  {
    sender: "in",
    text: "Best with food, in something cold or room temp (heat kills the probiotics). Most parents mix it into yogurt or applesauce at breakfast. Want to see exactly how others do it?",
    showBy: 2,
  },
  {
    sender: "in",
    type: "link",
    showBy: 2,
    link: { label: "aspirenutrition.com/bio-heal", url: "#bio-heal" },
  },
];

const CHAT_MESSAGES = [
  {
    sender: "in",
    type: "system",
    text: "Picking up from your text conversation",
    showBy: 3,
  },
  {
    sender: "in",
    text: "Welcome back, Sarah. We were just chatting about giving Bio-Heal to your 4-year-old. Your code WELCOME15 is still good — want me to walk through the morning routine other parents use, or grab the Starter Pack first?",
    showBy: 3,
  },
  { sender: "out", text: "show me the routine first", showBy: 4 },
  {
    sender: "in",
    text: "Quick version: ½ scoop into 2-3 oz of yogurt or applesauce at breakfast. Stir it in — flavorless. The cold dairy and food in her stomach is the key for probiotic survival. Most parents do it right when they pour her morning cereal so it becomes routine.",
    showBy: 4,
  },
  {
    sender: "in",
    text: "Want me to add the Starter Pack with WELCOME15 applied?",
    showBy: 4,
  },
  { sender: "out", text: "yes please", showBy: 4 },
  {
    sender: "in",
    type: "product",
    showBy: 4,
    product: {
      title: "Bio-Heal · Starter Pack",
      sub: "30 servings",
      price: "$46.71",
      strike: "$54.95",
      note: "WELCOME15 applied · added to cart",
    },
  },
];

function StatusBar() {
  return (
    <div className="flex justify-between items-center px-6 py-2 text-[11px] font-semibold text-black">
      <span>9:41</span>
      <div className="flex items-center gap-1">
        <span>●●●●●</span>
        <span className="ml-1">100%</span>
      </div>
    </div>
  );
}

function Phone({ scene }) {
  const visible = SMS_MESSAGES.filter((m) => scene >= m.showBy);
  const linkTapped = scene >= 3;
  const containerRef = useRef(null);
  useEffect(() => {
    if (containerRef.current) containerRef.current.scrollTop = containerRef.current.scrollHeight;
  }, [visible.length, scene]);

  return (
    <div className="phone-frame">
      <div className="phone-screen">
        <StatusBar />
        <div className="border-b border-gray-200 px-4 py-2 flex flex-col items-center">
          <div
            className="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xs"
            style={{ background: ASPIRE.navy }}
          >
            A
          </div>
          <div className="text-xs font-semibold mt-1" style={{ color: ASPIRE.navy }}>
            Aspire Nutrition
          </div>
          <div className="text-[10px] text-gray-500">SMS · AI Journey</div>
        </div>
        <div ref={containerRef} className="flex-1 overflow-y-auto scrollable px-3 py-3 space-y-2 flex flex-col">
          {visible.map((m, i) => {
            if (m.type === "card") {
              return (
                <div key={i} className="fade-in flex justify-start w-full">
                  <div className="bg-gray-100 rounded-2xl p-2.5 max-w-[82%] border border-gray-200">
                    <div
                      className="rounded-lg p-3 mb-2 flex items-center gap-3"
                      style={{ background: "linear-gradient(135deg, #fff7ed, #e0f2fe)" }}
                    >
                      <div className="w-12 h-12 rounded bg-white flex items-center justify-center text-xl shadow-sm">
                        🧬
                      </div>
                      <div className="flex-1">
                        <div className="text-xs font-semibold" style={{ color: ASPIRE.navy }}>
                          {m.card.title}
                        </div>
                        <div className="text-[10px] text-gray-500">{m.card.sub}</div>
                        <div className="text-xs mt-0.5">
                          <span className="font-bold" style={{ color: ASPIRE.navy }}>
                            {m.card.price}
                          </span>
                          <span className="line-through text-gray-400 ml-1">{m.card.strike}</span>
                        </div>
                      </div>
                    </div>
                    <div
                      className="text-[10px] text-white px-2 py-1 rounded text-center font-semibold"
                      style={{ background: ASPIRE.orange }}
                    >
                      {m.card.badge}
                    </div>
                  </div>
                </div>
              );
            }
            if (m.type === "link") {
              return (
                <div key={i} className="fade-in flex justify-start">
                  <div className={`bubble-in ${linkTapped ? "ring-2 ring-blue-400" : ""}`}>
                    <a className="text-blue-600 underline text-sm" href="#" onClick={(e) => e.preventDefault()}>
                      {m.link.label}
                    </a>
                    {!linkTapped && (
                      <div className="text-[10px] text-gray-500 mt-1">Tap "Next →" to follow this link</div>
                    )}
                    {linkTapped && (
                      <div className="text-[10px] font-semibold mt-1" style={{ color: ASPIRE.navy }}>
                        ↗ Opening on-site chat...
                      </div>
                    )}
                  </div>
                </div>
              );
            }
            return (
              <div key={i} className={`fade-in ${m.sender === "in" ? "bubble-in" : "bubble-out"}`}>
                <div className="text-sm leading-snug">{m.text}</div>
              </div>
            );
          })}
        </div>
        <div className="border-t border-gray-200 px-3 py-2 flex items-center gap-2">
          <div className="flex-1 bg-gray-100 rounded-full px-3 py-1.5 text-xs text-gray-400">iMessage</div>
        </div>
      </div>
    </div>
  );
}

function Browser({ scene }) {
  const chatOpen = scene >= 3;
  const visibleChat = CHAT_MESSAGES.filter((m) => scene >= m.showBy);
  const cartCount = scene >= 4 ? 1 : 0;
  const chatRef = useRef(null);
  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [visibleChat.length, chatOpen]);

  return (
    <div className="browser-frame">
      <div className="flex items-center gap-2 px-3 py-2 bg-gray-100 border-b border-gray-200">
        <div className="flex gap-1.5">
          <div className="w-3 h-3 rounded-full bg-red-400"></div>
          <div className="w-3 h-3 rounded-full bg-yellow-400"></div>
          <div className="w-3 h-3 rounded-full bg-green-400"></div>
        </div>
        <div className="flex-1 bg-white rounded-md px-3 py-1 text-xs text-gray-600 border border-gray-200 truncate">
          🔒 aspirenutrition.com/products/bio-heal?ajt=eyJzaG9wcGVyIjoic2FyYWg...
        </div>
      </div>
      <div className="flex-1 overflow-y-auto scrollable">
        <div
          className="text-white text-center text-xs py-2 font-semibold tracking-wide"
          style={{ background: ASPIRE.navy }}
        >
          FREE Domestic Shipping on Orders $70+
        </div>
        <div className="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
          <div className="flex items-center gap-5 text-xs font-semibold" style={{ color: ASPIRE.navy }}>
            <span>Shop</span>
            <span>About</span>
            <span>Resources</span>
            <span>Success Stories</span>
          </div>
          <div
            className="flex flex-col items-center"
            style={{ color: ASPIRE.navy }}
          >
            <div className="text-lg" style={{ color: ASPIRE.orange }}>▲</div>
            <div className="text-xs font-bold tracking-widest">aspire</div>
            <div className="text-[8px] tracking-widest" style={{ color: ASPIRE.navy }}>NUTRITION</div>
          </div>
          <div className="flex items-center gap-4 text-xs font-semibold" style={{ color: ASPIRE.navy }}>
            <span>⭐ Rewards</span>
            <span>👤 Account</span>
            <span className="relative">
              🛒 Cart
              {cartCount > 0 && (
                <span
                  className="absolute -top-2 -right-3 text-[10px] text-white rounded-full w-5 h-5 flex items-center justify-center font-bold"
                  style={{ background: ASPIRE.orange }}
                >
                  {cartCount}
                </span>
              )}
            </span>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-6 p-7">
          <div
            className="aspect-square rounded-xl flex items-center justify-center text-7xl"
            style={{ background: ASPIRE.blueLight }}
          >
            🧬
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-widest font-semibold mb-2" style={{ color: ASPIRE.orange }}>
              BIO-HEAL · DAILY PROBIOTIC
            </div>
            <h1 className="text-2xl font-bold mb-3 leading-tight" style={{ color: ASPIRE.navy }}>
              Bio-Heal Starter Pack
            </h1>
            <div className="text-xs text-gray-600 mb-4 leading-relaxed">
              Restore the gut. Support the whole child. A daily flavorless probiotic for kids 3+, formulated by clinicians.
            </div>
            <div className="flex items-baseline gap-2 mb-4">
              <span className="text-2xl font-bold" style={{ color: ASPIRE.navy }}>
                $54.95
              </span>
              <span className="text-xs text-gray-500">/ 30 servings</span>
            </div>
            <button
              className="w-full py-2.5 rounded-md text-white font-semibold text-sm"
              style={{ background: ASPIRE.navy }}
            >
              Add to cart
            </button>
            <div className="mt-4 grid grid-cols-3 gap-1.5 text-[9px] text-center">
              <div className="bg-gray-50 rounded p-1.5 font-semibold" style={{ color: ASPIRE.navy }}>
                ⭐ DOCTOR APPROVED
              </div>
              <div className="bg-gray-50 rounded p-1.5 font-semibold" style={{ color: ASPIRE.navy }}>
                🌿 GLUTEN FREE
              </div>
              <div className="bg-gray-50 rounded p-1.5 font-semibold" style={{ color: ASPIRE.navy }}>
                🧪 LAB TESTED
              </div>
            </div>
          </div>
        </div>
      </div>

      {!chatOpen && (
        <div
          className="absolute bottom-5 left-5 w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-white text-2xl pulse-ring"
          style={{ background: ASPIRE.blue }}
        >
          💬
        </div>
      )}

      {chatOpen && (
        <div className="chat-widget fade-in">
          <div
            className="px-4 py-3 flex items-center justify-between border-b"
            style={{ borderColor: "rgba(26,37,80,0.12)" }}
          >
            <div>
              <div className="text-sm font-semibold" style={{ color: ASPIRE.navy }}>
                Aspire Nutrition
              </div>
              <div className="text-[10px]" style={{ color: ASPIRE.navy, opacity: 0.7 }}>
                Continued from your text · AI-powered
              </div>
            </div>
            <div className="flex items-center gap-2">
              <div
                className="text-[9px] px-2 py-0.5 rounded-full font-semibold"
                style={{ background: ASPIRE.orange, color: "#fff" }}
              >
                LIVE
              </div>
              <button className="text-lg leading-none" style={{ color: ASPIRE.navy }}>
                ×
              </button>
            </div>
          </div>

          <div
            className="px-4 py-1.5 text-[10px] font-semibold flex items-center justify-center gap-1"
            style={{ color: ASPIRE.navy, background: "rgba(255,255,255,0.45)" }}
          >
            ↑ Picking up from your SMS conversation ↑
          </div>

          <div
            className="px-4 py-2 space-y-1 border-b"
            style={{ borderColor: "rgba(26,37,80,0.1)", background: "rgba(255,255,255,0.3)" }}
          >
            <div
              className="text-[9px] uppercase font-semibold tracking-wider"
              style={{ color: ASPIRE.navy, opacity: 0.6 }}
            >
              Earlier — over text
            </div>
            {SMS_MESSAGES.filter((m) => !m.type || (m.type !== "card" && m.type !== "link"))
              .slice(-3)
              .map((m, i) => (
                <div key={i} className={`text-[10px] ${m.sender === "in" ? "text-left" : "text-right"}`}>
                  <span
                    className="px-2 py-1 rounded inline-block max-w-[88%] leading-snug"
                    style={{
                      background: m.sender === "in" ? "rgba(255,255,255,0.85)" : ASPIRE.navy,
                      color: m.sender === "in" ? ASPIRE.navy : "#fff",
                    }}
                  >
                    {m.text.length > 90 ? m.text.slice(0, 90) + "…" : m.text}
                  </span>
                </div>
              ))}
          </div>

          <div ref={chatRef} className="flex-1 overflow-y-auto scrollable px-4 py-3 space-y-2 flex flex-col">
            {visibleChat.map((m, i) => {
              if (m.type === "system") {
                return (
                  <div
                    key={i}
                    className="text-center text-[10px] py-1 fade-in"
                    style={{ color: ASPIRE.navy, opacity: 0.65 }}
                  >
                    — {m.text} —
                  </div>
                );
              }
              if (m.type === "product") {
                return (
                  <div key={i} className="fade-in flex justify-start">
                    <div className="bg-white rounded-xl p-3 shadow-sm w-full">
                      <div className="flex items-center gap-3">
                        <div
                          className="w-12 h-12 rounded flex items-center justify-center text-2xl"
                          style={{ background: ASPIRE.blueLight }}
                        >
                          🧬
                        </div>
                        <div className="flex-1">
                          <div className="text-xs font-semibold" style={{ color: ASPIRE.navy }}>
                            {m.product.title}
                          </div>
                          <div className="text-[10px] text-gray-500">{m.product.sub}</div>
                          <div className="text-[11px] mt-0.5">
                            <span className="font-bold" style={{ color: ASPIRE.navy }}>
                              {m.product.price}
                            </span>
                            <span className="line-through text-gray-400 ml-1">{m.product.strike}</span>
                          </div>
                          <div className="text-[10px] mt-0.5 font-semibold" style={{ color: ASPIRE.orange }}>
                            ✓ {m.product.note}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              }
              return (
                <div
                  key={i}
                  className={`fade-in ${m.sender === "in" ? "chat-bubble-in" : "chat-bubble-out"}`}
                >
                  <div className="text-xs leading-snug">{m.text}</div>
                </div>
              );
            })}
          </div>

          <div
            className="px-3 py-2 border-t"
            style={{ borderColor: "rgba(26,37,80,0.1)", background: "rgba(255,255,255,0.5)" }}
          >
            <div className="bg-white rounded-full px-3 py-1.5 text-[11px] text-gray-400">Ask anything</div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [scene, setScene] = useState(1);
  const current = SCENES.find((s) => s.id === scene);

  return (
    <div className="min-h-screen flex flex-col">
      <div
        className="text-white px-6 py-3 flex items-center justify-between"
        style={{ background: ASPIRE.navyDeep }}
      >
        <div>
          <div className="text-[10px] uppercase tracking-widest opacity-70">
            Aspire Nutrition · prototype
          </div>
          <div className="text-base font-semibold">
            AI Journey → Shopping Assistant: Continue Conversation on Chat
          </div>
        </div>
        <div className="flex gap-1.5">
          {SCENES.map((s) => (
            <button
              key={s.id}
              onClick={() => setScene(s.id)}
              className={`px-3 py-1.5 rounded text-xs font-semibold transition ${
                scene === s.id ? "bg-white text-slate-900" : "bg-white/10 hover:bg-white/20"
              }`}
            >
              Act {s.id}
            </button>
          ))}
        </div>
      </div>

      <div className="bg-white px-6 py-2.5 border-b border-gray-200 flex items-center justify-between">
        <div>
          <div className="text-sm font-semibold" style={{ color: ASPIRE.navy }}>
            {current.title}
          </div>
          <div className="text-xs text-gray-600 mt-0.5">{current.caption}</div>
        </div>
        <div
          className="text-[10px] uppercase tracking-wider font-semibold px-2.5 py-1 rounded"
          style={{ background: ASPIRE.blueLight, color: ASPIRE.navy }}
        >
          {current.pillar}
        </div>
      </div>

      <div className="flex-1 flex items-center justify-center gap-6 px-6 py-6 bg-gradient-to-b from-slate-100 to-slate-200">
        <div
          className={`transition-all duration-500 ${
            current.activeDevice === "browser" ? "opacity-30 scale-95" : "opacity-100"
          }`}
        >
          <Phone scene={scene} />
        </div>
        <div
          className={`transition-all duration-500 flex-1 max-w-3xl ${
            current.activeDevice === "phone" ? "opacity-30 scale-95" : "opacity-100"
          }`}
        >
          <Browser scene={scene} />
        </div>
      </div>

      <div className="bg-white px-6 py-3 border-t border-gray-200 flex items-center justify-between">
        <button
          onClick={() => setScene(Math.max(1, scene - 1))}
          disabled={scene === 1}
          className="px-4 py-1.5 rounded text-sm font-semibold disabled:opacity-30 transition"
          style={{ color: ASPIRE.navy, border: `1px solid ${ASPIRE.navy}` }}
        >
          ← Previous
        </button>
        <div className="text-xs text-gray-500">
          Scene {scene} of {SCENES.length}
        </div>
        <button
          onClick={() => setScene(Math.min(SCENES.length, scene + 1))}
          disabled={scene === SCENES.length}
          className="px-4 py-1.5 rounded text-sm font-semibold text-white disabled:opacity-30 transition"
          style={{ background: ASPIRE.navy }}
        >
          Next →
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
