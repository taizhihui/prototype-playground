        {/* PHONE */}
        <div style={{ width: 380, flexShrink: 0 }}>
          <div style={{ backgroundColor: "#222", borderRadius: 32, padding: 8 }}>
            <div style={{ backgroundColor: "white", borderRadius: 26, overflow: "hidden" }}>
              
              {/* Status bar */}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 20px", fontSize: 13, fontWeight: 600, position: "relative" }}>
                <span>9:41</span>
                <div style={{ position: "absolute", left: "50%", transform: "translateX(-50%)", width: 70, height: 22, backgroundColor: "#000", borderRadius: 11, top: 0 }} />
                <span>📶🔋</span>
              </div>

              {/* Chat header */}
              <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderBottom: "1px solid #eee" }}>
                <span style={{ color: "#3b82f6", fontSize: 20 }}>‹</span>
                <div style={{ width: 32, height: 32, borderRadius: 16, backgroundColor: BRAND_COLOR, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: 14 }}>A</div>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 15 }}>Aspire Nutrition</div>
                  <div style={{ fontSize: 11, color: BRAND_COLOR }}>RCS Business Messaging</div>
                </div>
              </div>

              {/* Messages */}
              <div ref={scrollRef} style={{ height: 400, overflowY: "auto", padding: 14, backgroundColor: "#fff" }}>
                <div style={{ textAlign: "center", fontSize: 11, color: "#999", marginBottom: 14 }}>{getTimestamp()}</div>
                
                {messages.map(renderMessage)}

                {typing && (
                  <div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 12 }}>
                    <div style={{ width: 28, height: 28, borderRadius: 14, backgroundColor: BRAND_COLOR, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: 12 }}>A</div>
                    <div style={{ backgroundColor: "#f3f4f6", padding: "12px 16px", borderRadius: 18, borderTopLeftRadius: 4, color: "#999" }}>• • •</div>
                  </div>
                )}

                {replies.length > 0 && !typing && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 8 }}>
                    {replies.map(function(r, i) {
                      return (
                        <button
                          key={i}
                          onClick={function() { handleReply(r); }}
                          style={{ padding: "8px 14px", borderRadius: 18, border: "2px solid #3b82f6", backgroundColor: "white", color: "#3b82f6", fontSize: 13, fontWeight: 500, cursor: "pointer" }}
                        >
                          {r}
                        </button>
                      );
                    })}
                  </div>
                )}

                {replies.length === 0 && !typing && messages.length > 0 && (
                  <div style={{ textAlign: "center", padding: 16 }}>
                    <div style={{ fontSize: 11, color: "#999", marginBottom: 6 }}>End of conversation</div>
                    <button onClick={restart} style={{ fontSize: 12, color: BRAND_COLOR, background: "none", border: "none", cursor: "pointer" }}>↻ Start over</button>
                  </div>
                )}
              </div>

              {/* Input */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: 10, borderTop: "1px solid #eee" }}>
                <span style={{ color: "#999", fontSize: 20 }}>+</span>
                <div style={{ flex: 1, backgroundColor: "#f3f4f6", borderRadius: 18, padding: "8px 14px", fontSize: 14, color: "#999" }}>RCS message</div>
                <div style={{ width: 28, height: 28, borderRadius: 14, backgroundColor: "#e5e7eb", display: "flex", alignItems: "center", justifyContent: "center", color: "#999", fontSize: 14 }}>↑</div>
              </div>
            </div>
          </div>

          <div style={{ textAlign: "center", marginTop: 16 }}>
            <button onClick={restart} style={{ fontSize: 13, color: "#666", background: "none", border: "none", cursor: "pointer" }}>↻ Restart conversation</button>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div style={{ width: rightPanelOpen ? 280 : 44, transition: "width 0.2s ease", flexShrink: 0 }}>
          <button
            onClick={function() { setRightPanelOpen(!rightPanelOpen); }}
            style={{
              width: "100%", padding: "10px 12px", backgroundColor: "#3d1f5c", border: "1px solid #a855f7",
              borderRadius: rightPanelOpen ? "12px 12px 0 0" : 12, color: "#d8b4fe", fontSize: 12, fontWeight: 600,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: rightPanelOpen ? "space-between" : "center", gap: 8,
            }}
          >
            {rightPanelOpen ? "👤 Shopper Context" : "👤"}
            <span style={{ fontSize: 10 }}>{rightPanelOpen ? "▶" : "◀"}</span>
          </button>
          {rightPanelOpen && (
            <div style={{ backgroundColor: "#1a0a2e", border: "1px solid #a855f7", borderTop: "none", borderRadius: "0 0 12px 12px", padding: 14, fontSize: 11, color: "#e9d5ff", maxHeight: 580, overflowY: "auto" }}>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{currentShopperContext.name}</div>
                <div style={{ display: "inline-block", marginTop: 4, padding: "2px 8px", borderRadius: 10, fontSize: 10, fontWeight: 600, backgroundColor: currentShopperContext.lifecycleColor, color: "#fff" }}>
                  {currentShopperContext.lifecycle}
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ color: "#a855f7", fontWeight: 600, marginBottom: 6 }}>📍 Demographics</div>
                <div style={{ marginBottom: 4 }}>• {currentShopperContext.demographics.location}</div>
                <div>• {currentShopperContext.demographics.family}</div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ color: "#a855f7", fontWeight: 600, marginBottom: 6 }}>👶 Child Info</div>
                <div style={{ fontSize: 10, color: "#c084fc", marginBottom: 4 }}>{currentShopperContext.childInfo.label}</div>
                {currentShopperContext.childInfo.details.map(function(d, i) { return <div key={i} style={{ marginBottom: 4 }}>• {d}</div>; })}
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ color: "#a855f7", fontWeight: 600, marginBottom: 6 }}>🛍️ Purchase History</div>
                {currentShopperContext.purchaseHistory ? (
                  currentShopperContext.purchaseHistory.map(function(p, i) {
                    return (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, padding: "4px 6px", backgroundColor: "#2d1a4a", borderRadius: 4 }}>
                        <span>{p.item}</span>
                        <span style={{ color: "#a855f7" }}>{p.date}</span>
                      </div>
                    );
                  })
                ) : (
                  <div style={{ color: "#888", fontStyle: "italic" }}>No purchases yet</div>
                )}
              </div>
              {currentShopperContext.pastConversations && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ color: "#a855f7", fontWeight: 600, marginBottom: 6 }}>💬 Past Conversations</div>
                  {currentShopperContext.pastConversations.map(function(c, i) { return <div key={i} style={{ marginBottom: 4 }}>• {c}</div>; })}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* RCS Features Legend */}
      <div style={{ textAlign: "center", marginTop: 24, padding: 16, backgroundColor: "#1a1a2e", borderRadius: 12, maxWidth: 600, margin: "24px auto 0" }}>
        <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>RCS FEATURES DEMONSTRATED</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 16, flexWrap: "wrap" }}>
          {[
            { icon: "🎴", label: "Rich Cards" },
            { icon: "🎠", label: "Carousels" },
            { icon: "▶️", label: "Video" },
            { icon: "📊", label: "Media" },
            { icon: "🗺️", label: "Maps" },
            { icon: "💬", label: "Quick Reply" },
          ].map(function(f, i) {
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span>{f.icon}</span>
                <span style={{ fontSize: 11, color: "#aaa" }}>{f.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
