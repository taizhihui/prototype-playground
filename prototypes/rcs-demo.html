          {msg.review && <div style={{ backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 16, padding: 14, maxWidth: 240 }}><div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}><div style={{ width: 32, height: 32, borderRadius: 16, backgroundColor: "#e0f2fe", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>👩</div><div><div style={{ fontSize: 12, fontWeight: 600 }}>{msg.review.author}</div><div style={{ color: "#facc15", fontSize: 10 }}>★★★★★ Verified</div></div></div><div style={{ fontSize: 13, fontStyle: "italic", color: "#555", lineHeight: 1.4 }}>"{msg.review.quote}"</div></div>}
          {msg.order && <div style={{ backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 16, padding: 14, maxWidth: 240 }}><div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}><div style={{ width: 8, height: 8, borderRadius: 4, backgroundColor: "#22c55e" }}></div><span style={{ fontSize: 13, fontWeight: 600, color: "#333" }}>Order Confirmed</span></div><div style={{ fontSize: 14, fontWeight: 500, color: "#333" }}>{msg.order.item}</div><div style={{ fontSize: 13, color: "#666", marginTop: 2 }}>{msg.order.price}</div><div style={{ marginTop: 10, padding: "8px 10px", backgroundColor: "#f0fdfa", borderRadius: 8, fontSize: 12, color: BRAND_COLOR, fontWeight: 500 }}>📦 {msg.order.eta}</div></div>}
          {msg.tracking && <div style={{ backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 16, padding: 14, maxWidth: 240 }}><div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}><div style={{ width: 8, height: 8, borderRadius: 4, backgroundColor: "#3b82f6" }}></div><span style={{ fontSize: 13, fontWeight: 600, color: "#333" }}>{msg.tracking.status}</span></div><div style={{ fontSize: 12, color: "#666" }}>{msg.tracking.carrier}</div><div style={{ fontSize: 10, color: "#999", marginTop: 4, fontFamily: "monospace", backgroundColor: "#f8fafc", padding: "4px 6px", borderRadius: 4 }}>{msg.tracking.tracking}</div><div style={{ marginTop: 10, padding: "8px 10px", backgroundColor: "#f0fdfa", borderRadius: 8, fontSize: 12, color: BRAND_COLOR, fontWeight: 500 }}>📦 {msg.tracking.eta}</div></div>}
          {msg.tips && <div style={{ backgroundColor: "#fff", border: "1px solid #e5e7eb", borderRadius: 16, padding: 14, maxWidth: 250 }}><div style={{ fontSize: 13, fontWeight: 600, color: "#333", marginBottom: 10 }}>{msg.tips.title}</div>{msg.tips.items.map((tip, idx) => <div key={idx} style={{ display: "flex", gap: 8, marginBottom: 8, fontSize: 13, color: "#555" }}><span>{tip.emoji}</span><span>{tip.text}</span></div>)}</div>}
          {msg.bundle && <div style={{ backgroundColor: "#fff", border: "2px solid #22c55e", borderRadius: 16, padding: 14, maxWidth: 240 }}><div style={{ fontSize: 14, fontWeight: 700, color: "#333", marginBottom: 8 }}>🎁 {msg.bundle.title}</div>{msg.bundle.items.map((item, idx) => <div key={idx} style={{ fontSize: 13, color: "#555", marginBottom: 4 }}>✓ {item}</div>)}<div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 13, color: "#999", textDecoration: "line-through" }}>{msg.bundle.originalPrice}</span><span style={{ fontSize: 18, fontWeight: 700, color: "#22c55e" }}>{msg.bundle.bundlePrice}</span></div><div style={{ marginTop: 6, fontSize: 12, color: "#22c55e", fontWeight: 500 }}>{msg.bundle.savings}</div></div>}
        </div>
      </div>
    );
  };

  return (
    <div style={{ minHeight: "100vh", backgroundColor: "#111", padding: 20, fontFamily: "system-ui, sans-serif" }}>
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <div style={{ display: "inline-block", padding: "4px 12px", backgroundColor: "#333", color: "#aaa", fontSize: 11, borderRadius: 20, marginBottom: 8 }}>INTERACTIVE DEMO</div>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: "#2dd4bf", margin: 0 }}>Aspire Nutrition × RCS</h1>
        <p style={{ color: "#777", fontSize: 13, marginTop: 4 }}>AI-powered conversational commerce</p>
      </div>
      <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 12 }}>
        {["cart", "post", "new"].map(t => <button key={t} onClick={() => setTab(t)} style={{ padding: "8px 14px", borderRadius: 20, border: "none", fontSize: 13, fontWeight: 500, cursor: "pointer", backgroundColor: tab === t ? BRAND_COLOR : "#333", color: tab === t ? "white" : "#aaa" }}>{t === "cart" ? "🛒 Cart Abandonment" : t === "post" ? "📦 Post-Purchase" : "🚀 New Product"}</button>)}
      </div>
      {tab === "post" && <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 16 }}>{["confirmed", "day7", "day45"].map(st => <button key={st} onClick={() => setPostSubTab(st)} style={{ padding: "5px 12px", borderRadius: 12, border: postSubTab === st ? "2px solid " + BRAND_COLOR : "1px solid #555", fontSize: 12, fontWeight: 500, cursor: "pointer", backgroundColor: postSubTab === st ? "#164e63" : "#222", color: postSubTab === st ? "#2dd4bf" : "#888" }}>{postPurchaseScenarios[st].label}</button>)}</div>}
      <div style={{ display: "flex", justifyContent: "center", gap: 16, alignItems: "flex-start" }}>
        <AIContextPanel tab={tab} isOpen={leftPanelOpen} onToggle={() => setLeftPanelOpen(!leftPanelOpen)} />
        <div style={{ width: 380, flexShrink: 0 }}>
          <div style={{ backgroundColor: "#222", borderRadius: 32, padding: 8 }}>
            <div style={{ backgroundColor: "white", borderRadius: 26, overflow: "hidden" }}>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 20px", fontSize: 13, fontWeight: 600, position: "relative" }}><span>9:41</span><div style={{ position: "absolute", left: "50%", transform: "translateX(-50%)", width: 70, height: 22, backgroundColor: "#000", borderRadius: 11, top: 0 }}></div><span>📶🔋</span></div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderBottom: "1px solid #eee" }}><span style={{ color: "#3b82f6", fontSize: 20 }}>‹</span><div style={{ width: 32, height: 32, borderRadius: 16, backgroundColor: BRAND_COLOR, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: 14 }}>A</div><div><div style={{ fontWeight: 600, fontSize: 15 }}>Aspire Nutrition</div><div style={{ fontSize: 11, color: BRAND_COLOR }}>Online now</div></div></div>
              <div ref={scrollRef} style={{ height: 400, overflowY: "auto", padding: 14, backgroundColor: "#fff" }}>
                <div style={{ textAlign: "center", fontSize: 11, color: "#999", marginBottom: 14 }}>{getTimestamp()}</div>
                {messages.map(renderMessage)}
                {typing && <div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 12 }}><div style={{ width: 28, height: 28, borderRadius: 14, backgroundColor: BRAND_COLOR, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: 12 }}>A</div><div style={{ backgroundColor: "#f3f4f6", padding: "12px 16px", borderRadius: 18, borderTopLeftRadius: 4, color: "#999" }}>• • •</div></div>}
                {replies.length > 0 && !typing && <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 8 }}>{replies.map((r, i) => <button key={i} onClick={() => handleReply(r)} style={{ padding: "8px 14px", borderRadius: 18, border: "2px solid #3b82f6", backgroundColor: "white", color: "#3b82f6", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>{r}</button>)}</div>}
                {replies.length === 0 && !typing && messages.length > 0 && <div style={{ textAlign: "center", padding: 16 }}><div style={{ fontSize: 11, color: "#999", marginBottom: 6 }}>End of conversation</div><button onClick={restart} style={{ fontSize: 12, color: BRAND_COLOR, background: "none", border: "none", cursor: "pointer" }}>↻ Start over</button></div>}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: 10, borderTop: "1px solid #eee" }}><span style={{ color: "#999", fontSize: 20 }}>+</span><div style={{ flex: 1, backgroundColor: "#f3f4f6", borderRadius: 18, padding: "8px 14px", fontSize: 14, color: "#999" }}>Message</div><div style={{ width: 28, height: 28, borderRadius: 14, backgroundColor: "#e5e7eb", display: "flex", alignItems: "center", justifyContent: "center", color: "#999", fontSize: 14 }}>↑</div></div>
            </div>
          </div>
          <div style={{ textAlign: "center", marginTop: 12 }}><button onClick={restart} style={{ fontSize: 12, color: "#666", background: "none", border: "none", cursor: "pointer" }}>↻ Restart conversation</button></div>
        </div>
        <ShopperContextPanel tab={tab} postSubTab={postSubTab} isOpen={rightPanelOpen} onToggle={() => setRightPanelOpen(!rightPanelOpen)} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
